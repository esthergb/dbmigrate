name: ci

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build release binary
        run: go build -trimpath -ldflags="-s -w" -o bin/dbmigrate ./cmd/dbmigrate

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l ./cmd ./internal)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Unit tests
        run: go test ./... -count=1

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  integration-strict-lts-smoke:
    runs-on: ubuntu-latest
    needs:
      - validate
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Strict-LTS Docker smoke (mysql84 -> mysql84)
        env:
          DBMIGRATE_ENABLE_COMPAT_PROBES: "0"
        run: ./scripts/test-v1-mysql84-to-mysql84.sh
