# Migration config: MariaDB 11.0 container -> MySQL 8.0 container
source: mariadb://root:rootpass123@127.0.0.1:13307/?tls=preferred
dest: mysql://root:rootpass123@127.0.0.1:23306/?tls=preferred

databases: []
exclude-databases:
  - information_schema
  - performance_schema
  - sys
  - mysql
include-objects:
  - tables
  - views
  - routines
  - triggers
  - events

concurrency: 4
verbose: true
json: false

tls-mode: preferred
state-dir: ./state/mariadb11-to-mysql80

downgrade-profile: max-compat
