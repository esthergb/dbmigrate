# Migration config: MySQL 8.4 strict-lts source -> MariaDB 11.4 strict-lts destination
source: mysql://root:rootpass123@127.0.0.1:24311/?tls=preferred
dest: mariadb://root:rootpass123@127.0.0.1:14412/?tls=preferred

databases: []
exclude-databases:
  - information_schema
  - performance_schema
  - sys
  - mysql
include-objects:
  - tables
  - views

concurrency: 4
verbose: true
json: false

tls-mode: preferred
state-dir: ./state/v1/mysql84a-to-mariadb114b

downgrade-profile: strict-lts
