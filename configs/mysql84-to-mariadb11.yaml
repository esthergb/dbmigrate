# Migration config: MySQL 8.4 container -> MariaDB 11.0 container
source: mysql://root:rootpass123@127.0.0.1:23307/?tls=preferred
dest: mariadb://root:rootpass123@127.0.0.1:13307/?tls=preferred

databases: []
exclude-databases:
  - information_schema
  - performance_schema
  - sys
  - mysql
include-objects:
  - tables
  - views

concurrency: 4
verbose: true
json: false

tls-mode: preferred
state-dir: ./state/mysql84-to-mariadb11

downgrade-profile: max-compat
