# Migration config: MySQL 8.0 container -> MariaDB 12.0 container
source: mysql://root:rootpass123@127.0.0.1:23306/?tls=preferred
dest: mariadb://root:rootpass123@127.0.0.1:13308/?tls=preferred

databases: []
exclude-databases:
  - information_schema
  - performance_schema
  - sys
  - mysql
include-objects:
  - tables
  - views
  - routines
  - triggers
  - events

concurrency: 4
verbose: true
json: false

tls-mode: preferred
state-dir: ./state/mysql80-to-mariadb12

downgrade-profile: max-compat
