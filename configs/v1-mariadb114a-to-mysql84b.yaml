# Migration config: MariaDB 11.4 strict-lts source -> MySQL 8.4 strict-lts destination
source: mariadb://root:rootpass123@127.0.0.1:14411/?tls=preferred
dest: mysql://root:rootpass123@127.0.0.1:24312/?tls=preferred

databases: []
exclude-databases:
  - information_schema
  - performance_schema
  - sys
  - mysql
include-objects:
  - tables
  - views
  - routines
  - triggers
  - events

concurrency: 4
verbose: true
json: false

tls-mode: preferred
state-dir: ./state/v1/mariadb114a-to-mysql84b

downgrade-profile: strict-lts
