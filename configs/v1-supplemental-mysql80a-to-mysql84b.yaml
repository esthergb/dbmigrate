# Migration config: MySQL 8.0 supplemental legacy upgrade evidence -> MySQL 8.4 destination
source: mysql://root:rootpass123@127.0.0.1:24310/?tls=preferred
dest: mysql://root:rootpass123@127.0.0.1:24312/?tls=preferred

databases: []
exclude-databases:
  - information_schema
  - performance_schema
  - sys
  - mysql
include-objects:
  - tables
  - views
  - routines
  - triggers
  - events

concurrency: 4
verbose: true
json: false

tls-mode: preferred
state-dir: ./state/v1-supplemental/mysql80a-to-mysql84b

downgrade-profile: max-compat
