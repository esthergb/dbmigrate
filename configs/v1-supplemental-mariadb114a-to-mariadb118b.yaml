# Migration config: MariaDB 11.4 supplemental same-major upgrade evidence -> MariaDB 11.8 destination
source: mariadb://root:rootpass123@127.0.0.1:14411/?tls=preferred
dest: mariadb://root:rootpass123@127.0.0.1:14812/?tls=preferred

databases: []
exclude-databases:
  - information_schema
  - performance_schema
  - sys
  - mysql
include-objects:
  - tables
  - views

concurrency: 4
verbose: true
json: false

tls-mode: preferred
state-dir: ./state/v1-supplemental/mariadb114a-to-mariadb118b

downgrade-profile: same-major
