# Migration config: MariaDB 11.8 strict-lts source -> MariaDB 11.8 strict-lts destination
source: mariadb://root:rootpass123@127.0.0.1:14811/?tls=preferred
dest: mariadb://root:rootpass123@127.0.0.1:14812/?tls=preferred

databases: []
exclude-databases:
  - information_schema
  - performance_schema
  - sys
  - mysql
include-objects:
  - tables
  - views

concurrency: 4
verbose: true
json: false

tls-mode: preferred
state-dir: ./state/v1/mariadb118a-to-mariadb118b

downgrade-profile: strict-lts
