# Migration config: MariaDB 12.0 container -> MariaDB 10.6 container (downgrade)
source: mariadb://root:rootpass123@127.0.0.1:13308/?tls=preferred
dest: mariadb://root:rootpass123@127.0.0.1:13306/?tls=preferred

databases: []
exclude-databases:
  - information_schema
  - performance_schema
  - sys
  - mysql
include-objects:
  - tables
  - views

concurrency: 4
verbose: true
json: false

tls-mode: preferred
state-dir: ./state/mariadb12-to-mariadb10

downgrade-profile: max-compat
